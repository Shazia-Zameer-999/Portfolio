<section class="section achievements" id="achievements" aria-labelledby="achievements-heading">
  <div class="container">

    <div class="section__header reveal-up">
      <span class="section__eyebrow">Recognition</span>
      <h2 class="section__title" id="achievements-heading">
        Milestones worth noting.
      </h2>
    </div>

    <div class="achievements__grid">
      {% for item in data.achievements %}
      <div class="glass achievement reveal-up" data-delay="{{ loop.index0 * 80 }}"
           aria-label="{{ item.title }}">
        <div class="achievement__icon" aria-hidden="true">
          {% if item.icon == "code" %}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="24" height="24" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          {% elif item.icon == "briefcase" %}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="24" height="24" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          {% elif item.icon == "github" %}
          <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          {% elif item.icon == "trophy" %}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="24" height="24" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>
          {% endif %}
        </div>
        <h3 class="achievement__title">{{ item.title }}</h3>
        <p class="achievement__desc">{{ item.description }}</p>
      </div>
      {% endfor %}
    </div>

  </div>
</section>
